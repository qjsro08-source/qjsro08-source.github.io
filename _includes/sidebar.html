<div class="sidebar">
  <div class="container sidebar-sticky">
    <div class="sidebar-about">
      <img class="sidebar-avatar" src="{{ '/assets/images/main.png' | relative_url }}" alt="{{ site.author.name }}">
      <h1>
        <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
      </h1>
      <p class="lead">{{ site.tagline }}</p>
    </div>

    <nav class="sidebar-nav">
      <a class="sidebar-nav-item" href="{{ '/#about' | relative_url }}">About</a>
      <a class="sidebar-nav-item" href="{{ '/#research-interests' | relative_url }}">Research Interests</a>
      <a class="sidebar-nav-item" href="{{ '/#education' | relative_url }}">Education</a>
      <a class="sidebar-nav-item" href="{{ '/#publications' | relative_url }}">Publications</a>
      <a class="sidebar-nav-item" href="{{ '/#skills' | relative_url }}">Skills</a>
      <a class="sidebar-nav-item" href="{{ '/#languages' | relative_url }}">Languages</a>
    </nav>

    <div class="sidebar-contact">
      {% if site.author.email %}<a href="mailto:{{ site.author.email }}">Email</a>{% endif %}
      {% if site.author.scholar %}<a href="{{ site.author.scholar }}">Scholar</a>{% endif %}
      {% if site.author.linkedin %}<a href="{{ site.author.linkedin }}">LinkedIn</a>{% endif %}
    </div>

    <p class="sidebar-copy">&copy; {{ site.time | date: '%Y' }} {{ site.author.name }}</p>
  </div>
</div>
